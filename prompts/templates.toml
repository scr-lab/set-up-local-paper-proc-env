# Open Notebook 論文処理プロンプトテンプレート集
# ────────────────────────────────────────────────────────────────
# Open Notebook のチャット欄にコピペして使ってください。
# ※ モデルによっては英語で返答することがあります。
#    その場合はプロンプトの先頭に「日本語で、」を付けてください。
# ────────────────────────────────────────────────────────────────

[basic_summary]
label = "基本要約（5項目）"
prompt = """
日本語で、この論文を以下の構成で要約してください。

1. **問題設定**: 何を解こうとしているか
2. **提案手法**: どのようなアプローチか（数式・アルゴリズムの概要も含む）
3. **主要な結果**: ベースラインとの定量比較を中心に
4. **貢献・新規性**: 先行研究と比べて何が新しいか
5. **限界・課題**: 著者が認めている制約や将来課題
"""

[method_detail]
label = "手法の詳細理解"
prompt = """
日本語で、提案手法のアーキテクチャ・アルゴリズムを詳しく説明してください。
以下の点を含めること:
- 入力・出力の形式
- 主要コンポーネントとその役割
- 学習手順（損失関数、最適化）
- 推論時の手順
初学者でも理解できるよう、具体例や直感的な説明を添えてください。
"""

[related_work]
label = "関連研究との比較"
prompt = """
日本語で、この論文が引用している先行研究のうち最も重要なものを5件挙げ、
本論文の手法とそれぞれを以下の観点で比較してください。
- 手法の違い
- 性能差（記載がある場合）
- 本論文が先行研究のどの限界を克服しているか
"""

[reproduce_checklist]
label = "再現実装チェックリスト"
prompt = """
日本語で、この論文の手法を再現実装するために必要な情報を整理してください。

- データセット（名前・入手先・前処理）
- モデル構造（レイヤー数、次元数、活性化関数など）
- ハイパーパラメータ（学習率、バッチサイズ、エポック数など）
- 評価指標と評価プロトコル
- 公開コード・チェックポイントのリンク（記載があれば）
- 論文中で不明確な点や再現困難な箇所
"""

[critical_review]
label = "批判的レビュー（査読者視点）"
prompt = """
日本語で、この論文を査読者の立場で批判的に評価してください。

**強み:**
- 理論的・実験的に説得力のある点

**弱み・疑問点:**
- 実験設計の問題（比較対象、評価指標の妥当性）
- 主張と証拠の乖離
- 再現性の懸念

**改善提案:**
- 追加すべき実験・分析
"""

[seminar_slides]
label = "ゼミ発表用スライドサマリー"
prompt = """
日本語で、この論文を研究室ゼミで発表するための箇条書きサマリーを作成してください。
スライド1枚につき3〜5箇条書き、全体で5スライド分:
1. 導入・背景
2. 提案手法
3. 実験設定
4. 結果・考察
5. まとめ・今後の課題

専門用語には簡単な説明を括弧で補足してください。
"""

[cross_comparison]
label = "複数論文の横断比較（複数PDF登録後）"
prompt = """
日本語で、このノートブックに登録されているすべての論文を横断的に比較してください。

比較軸:
- タスク・ドメイン
- 手法カテゴリ
- 使用データセット
- 主要評価指標と最高スコア
- 計算コスト（パラメータ数・推論速度の記載があれば）

表形式でまとめ、その後に総評を加えてください。
"""

[keyword_search]
label = "キーワード横断検索"
prompt = """
日本語で、登録されている論文の中から「{KEYWORD}」に関連する記述をすべて抽出してください。
論文ごとに:
- 該当箇所の要旨
- ページ番号や節番号（記載がある場合）
- 他の論文との比較

をまとめてください。※ {KEYWORD} を検索したいキーワードに変更してください。
"""

[future_research]
label = "研究アイデア発散"
prompt = """
日本語で、この論文の内容を踏まえて、次の研究アイデアを提案してください。

1. **直接的な拡張**: 本手法を改良・拡張するアイデア（3件）
2. **応用展開**: 異なるドメイン・タスクへの応用（3件）
3. **組み合わせ**: 他の手法と組み合わせることで期待できる発展（2件）

各アイデアについて実現可能性と期待されるインパクトも評価してください。
"""
